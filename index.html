<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{STATION_NAME}}</title>

    <!-- PWA相关配置 -->
    <meta name="theme-color" content="{{PRIMARY_COLOR}}">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="{{STATION_NAME}}">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="/favicon.ico">
    <style>
        /* 接收后端传来的自定义颜色变量 */
        :root {
            --primary-color: {{PRIMARY_COLOR}};
            --secondary-color: {{SECONDARY_COLOR}};
            --bg-color: {{BG_COLOR}};
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg-color);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }
        header { text-align: center; margin-bottom: 40px; }
        h1 {
            font-size: 3em;
            color: var(--primary-color);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        h1 .icon { font-size: 1.2em; }
        .subtitle {
            color: #666;
            font-size: 1.2em;
            margin-bottom: 30px;
        }
        .player-section, .playlist-section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid #e9ecef;
        }
        .player-section h2, .playlist-section h2 {
            color: #495057;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        audio { width: 100%; margin-bottom: 20px; border-radius: 10px; }
        .controls {
            display: flex; gap: 15px; align-items: center; flex-wrap: wrap;
        }
        button {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        button:hover { transform: translateY(-2px); opacity: 0.9; }
        button:active { transform: translateY(0); }
        #currentTrack {
            font-size: 1.2em; color: #495057; font-weight: 600;
            background: white; padding: 10px 20px; border-radius: 8px;
            flex-grow: 1; border: 2px solid #e9ecef;
        }
        #playlist {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 12px; max-height: 400px; overflow-y: auto; padding-right: 10px;
        }
        .track {
            background: white; padding: 15px; border-radius: 8px;
            cursor: pointer; transition: all 0.2s ease; border-left: 4px solid transparent;
        }
        .track:hover { background: #e9ecef; transform: translateX(5px); }
        .track.current {
            background: rgba(102, 126, 234, 0.1);
            border-left-color: var(--secondary-color);
        }
        .track-number {
            display: inline-block; width: 25px; text-align: center;
            background: var(--secondary-color); color: white;
            border-radius: 4px; margin-right: 10px; font-size: 0.9em; padding: 2px 5px;
        }
        .stats { display: flex; gap: 20px; margin-top: 30px; flex-wrap: wrap; }
        .stat-box {
            background: white; padding: 20px; border-radius: 10px;
            flex: 1; min-width: 200px; border: 1px solid #e9ecef; text-align: center;
        }
        .stat-value { font-size: 2.5em; font-weight: bold; color: var(--secondary-color); margin: 10px 0; }
        .stat-label { color: #6c757d; font-size: 0.9em; }
        footer {
            text-align: center; margin-top: 40px; color: #6c757d;
            font-size: 0.9em; padding-top: 20px; border-top: 1px solid #e9ecef;
        }
        .admin-link {
            display: inline-block; margin-top: 10px;
            color: var(--primary-color); text-decoration: none;
            font-weight: 600; padding: 6px 14px; border-radius: 6px;
            border: 1px solid var(--primary-color); transition: all 0.2s ease;
        }
        .admin-link:hover { background: var(--primary-color); color: white; }
        .admin-link.panel-link {
            background: var(--primary-color); color: white;
            margin-left: 10px;
        }
        .admin-link.panel-link:hover { background: var(--secondary-color); }
        .admin-controls {
            display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: 15px;
        }
        .admin-controls button {
            background: var(--secondary-color);
        }
        .admin-controls .delete-btn {
            background: #dc3545;
            font-size: 0.8em;
            padding: 4px 10px;
        }
    /* 移动端响应式适配 */
        @media (max-width: 768px) {
            .container {
                padding: 20px 15px;
                border-radius: 15px;
            }

            h1 {
                font-size: 2.2em;
                flex-direction: column;
                gap: 10px;
            }

            .player-section, .playlist-section {
                padding: 20px 15px;
            }

            .controls {
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
            }

            button {
                width: 100%;
                justify-content: center;
                padding: 14px 20px;
            }

            #playlist {
                grid-template-columns: 1fr;
                max-height: 500px;
            }

            .stats {
                flex-direction: column;
                gap: 15px;
            }

            .stat-box {
                min-width: 100%;
            }

            #currentTrack {
                text-align: center;
                padding: 12px 15px;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 15px 10px;
            }

            h1 {
                font-size: 1.8em;
            }

            .subtitle {
                font-size: 1em;
            }

            .player-section h2, .playlist-section h2 {
                font-size: 1.2em;
            }

            audio {
                height: 40px;
            }

            .track {
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><span class="icon">🎵</span> {{STATION_NAME}}</h1>
            <div class="subtitle">{{SUBTITLE}}</div>
        </header>
        
        <section class="player-section">
            <h2><span class="icon">▶️</span> 当前播放</h2>
            <audio id="player" controls autoplay>
                <source src="/stream" type="audio/mpeg">
            </audio>
            <div class="controls">
                <button id="nextBtn" onclick="playNext()">⏭️ 下一首</button>
                <button id="prevBtn" onclick="playPrev()" style="display:none;">⏮️ 上一首</button>
                <div id="currentTrack">正在加载播放列表...</div>
            </div>
        </section>
        
        <section class="playlist-section">
            <h2><span class="icon">📋</span> 播放列表 (<span id="trackCount">0</span> 首歌曲)</h2>
            <div id="playlist">加载中...</div>
        </section>
        
        <div class="stats">
            <div class="stat-box"><div class="stat-label">在线听众</div><div class="stat-value" id="clientCount">0</div></div>
            <div class="stat-box"><div class="stat-label">总曲目</div><div class="stat-value" id="totalTracks">0</div></div>
            <div class="stat-box"><div class="stat-label">当前曲目</div><div class="stat-value" id="currentIndex">-</div></div>
        </div>
        
        <footer>
            <p>&copy; {{STATION_NAME}} | 端口: 2240</p>
            <div id="footerLinks">
                <a class="admin-link" href="/admin">🔐 管理员入口</a>
            </div>
        </footer>
    </div>

    <script>
        const allowGuestSkip = {{ALLOW_GUEST_SKIP}};
        const isAdmin = {{IS_ADMIN}};
        let skipPollTimer = null;
        let lastKnownIndex = -1;

        document.addEventListener("DOMContentLoaded", () => {
            if (allowGuestSkip || isAdmin) {
                document.getElementById('nextBtn').style.display = '';
            } else {
                document.getElementById('nextBtn').style.display = 'none';
            }
            if (isAdmin) {
                document.getElementById('prevBtn').style.display = '';
                document.getElementById('footerLinks').innerHTML = 
                    '<a class="admin-link panel-link" href="/panel">⚙️ 管理面板</a>' +
                    ' <a class="admin-link" href="/admin/logout" onclick="logout(event)">退出</a>';
            }
        });

        async function loadPlaylist() {
            try {
                const response = await fetch('/api/playlist');
                const data = await response.json();
                renderPlaylistFromData(data);
            } catch (error) {
                console.error('加载播放列表失败:', error);
            }
        }

        function renderPlaylistFromData(data) {
            const playlist = data.playlist || [];
            const metadata = data.metadata || [];
            const currentIndex = data.current || 0;
            lastKnownIndex = currentIndex;

            const currentMeta = metadata[currentIndex];
            const currentDisplay = currentMeta
                ? (currentMeta.artist ? `${currentMeta.artist} - ${currentMeta.title}` : currentMeta.title)
                : (playlist[currentIndex] || '');

            document.getElementById('currentTrack').textContent = playlist.length > 0 ? `正在播放: ${currentDisplay}` : '播放列表为空';
            document.getElementById('trackCount').textContent = playlist.length;
            document.getElementById('totalTracks').textContent = playlist.length;
            document.getElementById('currentIndex').textContent = playlist.length > 0 ? currentIndex + 1 : '-';

            let html = '';
            if (playlist.length === 0) {
                html = '<div style="text-align: center; padding: 40px; color: #6c757d;"><div>播放列表为空，请上传音乐文件</div></div>';
            } else {
                const tracks = metadata.length > 0 ? metadata : playlist.map(f => ({ title: f, artist: '' }));
                tracks.forEach((track, index) => {
                    const isCurrent = index === currentIndex;
                    const title = track.title || track.filename || playlist[index];
                    const artist = track.artist || '';
                    const displayText = artist ? `${artist} - ${title}` : title;
                    const canInteract = allowGuestSkip || isAdmin;
                    const clickHandler = canInteract ? `onclick="playTrack(${index})"` : '';
                    const deleteBtn = isAdmin ? `<button class="delete-btn" onclick="event.stopPropagation(); deleteTrack(${index})">🗑️</button>` : '';
                    html += `
                        <div class="track ${isCurrent ? 'current' : ''}" ${clickHandler} style="${canInteract ? 'cursor:pointer' : ''}">
                            <span class="track-number">${index + 1}</span>
                            ${displayText}
                            ${isCurrent ? ' <span>▶️</span>' : ''}
                            ${deleteBtn}
                        </div>
                    `;
                });
            }
            document.getElementById('playlist').innerHTML = html;
        }

        async function loadStats() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();
                document.getElementById('clientCount').textContent = data.clients || 0;
            } catch (error) {}
        }

        function stopSkipPolling() {
            if (skipPollTimer) { clearInterval(skipPollTimer); skipPollTimer = null; }
        }

        async function playTrack(index) {
            if (!allowGuestSkip && !isAdmin) return;
            stopSkipPolling();
            try {
                await fetch('/api/play/' + index, { method: 'POST' });
                document.getElementById('nextBtn').disabled = true;
                if (isAdmin) document.getElementById('prevBtn').disabled = true;
                pollForTrackSwitch(index);
            } catch (error) { console.error(error); resetButtons(); }
        }

        async function playNext() {
            stopSkipPolling();
            try {
                await fetch('/api/next', { method: 'POST' });
                document.getElementById('nextBtn').disabled = true;
                if (isAdmin) document.getElementById('prevBtn').disabled = true;
                pollForTrackSwitch(-1);
            } catch (error) { console.error(error); resetButtons(); }
        }

        async function playPrev() {
            if (!isAdmin) return;
            stopSkipPolling();
            try {
                await fetch('/api/prev', { method: 'POST' });
                document.getElementById('nextBtn').disabled = true;
                document.getElementById('prevBtn').disabled = true;
                pollForTrackSwitch(-1);
            } catch (error) { console.error(error); resetButtons(); }
        }

        function pollForTrackSwitch(expectedIndex) {
            let attempts = 0;
            const MAX_ATTEMPTS = 20;
            skipPollTimer = setInterval(async () => {
                try {
                    const res = await fetch('/api/playlist');
                    const data = await res.json();
                    const newIndex = data.current || 0;
                    renderPlaylistFromData(data);
                    if (expectedIndex >= 0) {
                        if (newIndex === expectedIndex) {
                            onTrackSwitched();
                            return;
                        }
                    } else {
                        if (newIndex !== lastKnownIndex || attempts >= 2) {
                            onTrackSwitched();
                            return;
                        }
                    }
                } catch(e) {}
                attempts++;
                if (attempts >= MAX_ATTEMPTS) {
                    stopSkipPolling();
                    resetButtons();
                }
            }, 250);
        }

        function onTrackSwitched() {
            stopSkipPolling();
            resetButtons();
            setTimeout(() => {
                document.getElementById('player').load();
            }, 200);
        }

        function resetButtons() {
            document.getElementById('nextBtn').disabled = false;
            if (isAdmin) document.getElementById('prevBtn').disabled = false;
        }

        async function deleteTrack(index) {
            if (!isAdmin) return;
            if (!confirm(`确定要删除曲目 #${index + 1}吗？`)) return;
            try {
                const response = await fetch('/api/delete/' + index, { method: 'POST' });
                if (response.ok) {
                    loadPlaylist();
                } else {
                    alert('删除失败');
                }
            } catch (error) {
                console.error('删除失败:', error);
            }
        }

        async function logout(e) {
            e.preventDefault();
            try {
                await fetch('/admin/logout', { method: 'POST' });
                window.location.href = '/';
            } catch (error) {}
        }

        loadPlaylist(); loadStats();
        setInterval(loadPlaylist, 5000); setInterval(loadStats, 3000);

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(() => {});
        }
    </script>
</body>
</html>
