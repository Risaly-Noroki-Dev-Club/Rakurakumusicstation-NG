{% extends "base.html" %}

{% block content %}
<div class="page-header">
    <div>
        <h1>设置</h1>
        <div class="subtitle">个性化与账户</div>
    </div>
</div>

<div class="card">
    <div class="card-title">
        <span class="label"><i class="mdi mdi-account-circle-outline"></i>个人信息</span>
    </div>
    <div style="display:flex; align-items:center; gap:18px; margin-bottom:18px;">
        <div style="width:56px; height:56px; border-radius:var(--radius); background:var(--primary); display:flex; align-items:center; justify-content:center; color:#fff; font-size:28px; box-shadow: var(--elevation-4);">
            <i class="mdi mdi-account"></i>
        </div>
        <div>
            <div style="font-weight:700; font-size:18px; letter-spacing:-.01em;">{{ user.display_name }}</div>
            <div class="badge {% if is_admin %}primary{% endif %}" style="margin-top: 4px;">
                {% if is_admin %}<i class="mdi mdi-shield-crown"></i>管理员{% else %}<i class="mdi mdi-account"></i>用户{% endif %}
            </div>
        </div>
    </div>
    <form method="post" action="/api/auth/name" style="display:flex; gap:8px;">
        <input type="text" name="display_name" value="{{ user.display_name }}" placeholder="显示名称" maxlength="32" required style="flex:1;">
        <button type="submit" class="small"><i class="mdi mdi-pencil"></i>修改</button>
    </form>
</div>

<div class="card">
    <div class="card-title">
        <span class="label"><i class="mdi mdi-palette-outline"></i>外观</span>
    </div>
    <div class="form-group" style="margin-bottom: 0;">
        <label>主题</label>
        <div class="actions">
            <button type="button" class="small secondary" onclick="setTheme('light')"><i class="mdi mdi-weather-sunny"></i>浅色</button>
            <button type="button" class="small secondary" onclick="setTheme('dark')"><i class="mdi mdi-weather-night"></i>深色</button>
            <button type="button" class="small secondary" onclick="setTheme('auto')"><i class="mdi mdi-theme-light-dark"></i>跟随系统</button>
        </div>
    </div>
</div>

{% if !is_admin %}
<div class="card">
    <div class="card-title">
        <span class="label"><i class="mdi mdi-shield-account-outline"></i>申请管理员</span>
    </div>
    <p style="color:var(--text-secondary); font-size:14px; margin-bottom: 14px;">输入 <code style="background:var(--surface-3); padding:2px 6px; border-radius:4px; font-family:var(--font-mono); font-size:12.5px;">config.toml</code> 中的管理员令牌以获取管理员权限。</p>
    <form method="post" action="/api/auth/claim-admin" style="display:flex; gap:8px;">
        <input type="password" name="admin_setup_token" placeholder="管理员设置令牌" required style="flex:1;">
        <button type="submit" class="small"><i class="mdi mdi-key-variant"></i>申请</button>
    </form>
</div>
{% else %}
<div class="card">
    <div class="card-title">
        <span class="label"><i class="mdi mdi-shield-crown-outline"></i>管理员</span>
    </div>
    <a href="/admin" class="btn"><i class="mdi mdi-cog-transfer"></i>进入管理后台</a>
</div>
{% endif %}
{% endblock %}
